name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-13
            target: x86_64-apple-darwin
            arch: x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: 3.12

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dashboard
          uv python install 3.12
          uv venv --python 3.12 --clear .venv-uv
          . .venv-uv/bin/activate
          uv pip install -r requirements.txt pyinstaller
          pyinstaller -y --clean --onefile --name dashboard-server \
            --add-data "static:static" \
            --add-data "core/role_skills_registry.yaml:core" \
            --hidden-import engineio.async_drivers.threading \
            --hidden-import core.runners.copilot_cli \
            server.py
          mkdir -p ../src-tauri/binaries
          cp dist/dashboard-server ../src-tauri/binaries/dashboard-server-${{ matrix.target }}

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cd dashboard
          uv python install 3.12
          uv venv --python 3.12 --clear .venv-uv
          .\.venv-uv\Scripts\Activate.ps1
          uv pip install -r requirements.txt pyinstaller
          pyinstaller -y --clean --onefile --name dashboard-server `
            --add-data "static;static" `
            --add-data "core/role_skills_registry.yaml;core" `
            --hidden-import engineio.async_drivers.threading `
            --hidden-import core.runners.copilot_cli `
            server.py
          New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries | Out-Null
          Copy-Item dist\dashboard-server.exe ..\src-tauri\binaries\dashboard-server-${{ matrix.target }}.exe

      - name: Make sidecar executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/binaries/dashboard-server-${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri bundle
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload macOS app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AgenticFlow-${{ matrix.arch }}.app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/AgenticFlow.app

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AgenticFlow-windows-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: AgenticFlow-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets

          # macOS .app bundles -> zip
          for arch in aarch64 x86_64; do
            app_dir="artifacts/AgenticFlow-${arch}.app"
            if [ -d "$app_dir/AgenticFlow.app" ]; then
              (cd "$app_dir" && zip -ry ../release-assets/AgenticFlow_${arch}.app.zip AgenticFlow.app)
            fi
          done

          # Windows installer
          win_dir="artifacts/AgenticFlow-windows-x86_64"
          if [ -d "$win_dir" ]; then
            exe=$(ls "$win_dir"/*.exe | head -n1)
            if [ -n "$exe" ]; then
              cp "$exe" release-assets/AgenticFlow_x86_64-setup.exe
            fi
          fi

          # Linux .deb and .AppImage
          linux_dir="artifacts/AgenticFlow-linux-x86_64"
          if [ -d "$linux_dir" ]; then
            deb=$(ls "$linux_dir"/*.deb 2>/dev/null | head -n1)
            appimage=$(ls "$linux_dir"/*.AppImage 2>/dev/null | head -n1)
            [ -n "$deb" ] && cp "$deb" release-assets/AgenticFlow_x86_64.deb
            [ -n "$appimage" ] && cp "$appimage" release-assets/AgenticFlow_x86_64.AppImage
          fi

          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
