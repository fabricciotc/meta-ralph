<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AgenticFlow</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .loading { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Starting AgenticFlow...</p>
  </div>
</body>
</html>
