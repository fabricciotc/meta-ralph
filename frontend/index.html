<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline'; style-src * 'unsafe-inline'; connect-src *;">
  <title>AgenticFlow</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .loading { text-align: center; max-width: 320px; padding: 24px; }
    .logo { width: 96px; height: 96px; margin-bottom: 24px; border-radius: 20px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #94a3b8; margin-top: 16px; min-height: 20px; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="loading">
    <img src="logo.png" alt="AgenticFlow" class="logo">
    <div class="spinner"></div>
    <p>Starting AgenticFlow...</p>
    <div class="status" id="status">Connecting to local engine</div>
  </div>
  <script>
    const ENGINE_URL = 'http://127.0.0.1:5051';
    const HEALTH_URL = `${ENGINE_URL}/api/health`;
    const statusEl = document.getElementById('status');
    const MAX_ATTEMPTS = 40;
    let attempts = 0;

    async function tryConnect() {
      attempts++;
      statusEl.textContent = `Connecting to local engine (attempt ${attempts}/${MAX_ATTEMPTS})...`;
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 2000);
        const res = await fetch(HEALTH_URL, { signal: controller.signal });
        clearTimeout(timeout);
        if (res.ok) {
          statusEl.textContent = 'Engine ready. Loading dashboard...';
          window.location.replace(ENGINE_URL);
          return;
        }
      } catch (err) {
        // ignore, retry
      }
      if (attempts >= MAX_ATTEMPTS) {
        statusEl.innerHTML = '<span class="error">Could not start the local engine.<br>Please close and reopen the app.</span>';
        return;
      }
      setTimeout(tryConnect, 1500);
    }

    tryConnect();
  </script>
</body>
</html>
