pm_research:
  skills:
    - tech-research
    - agent-browser
  mcp_servers: []
  prompt_prefix: |
    Research the current codebase using web search and file reads. Be concise and cite sources.

product_manager:
  skills:
    - humanizer
  prompt_prefix: |
    Consolidate findings into a clear, well-structured PRD with no ambiguity.

architect:
  skills:
    - dotnet
    - mcp-builder
    - code-review
  mcp_servers: []
  prompt_prefix: |
    Define technical patterns, APIs, directory structure, and conventions. Do NOT write concrete code.

project_manager:
  skills:
    - writing-plans
  prompt_prefix: |
    Build an execution plan with a dependency DAG and parallel batches while respecting the worker limit.

engineer:
  skills:
    - dotnet
    - git-workflow
    - test-driven-development
    - crud
  mcp_servers:
    - filesystem
  prompt_prefix: |
    Implement real file changes, run build/tests, and respect the git workflow and Architect patterns.

qa:
  skills:
    - code-review
    - systematic-debugging
  prompt_prefix: |
    Review quality, build/tests, and consistency with architecture.md. Be strict but constructive.
