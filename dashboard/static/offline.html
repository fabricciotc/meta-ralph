<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgenticFlow — Offline</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f11;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
    }
    .box { max-width: 400px; padding: 2rem; }
    h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
    p { margin: 0 0 1.5rem; color: #9ca3af; line-height: 1.5; }
    code {
      display: inline-block;
      padding: 0.35rem 0.6rem;
      background: #1f2937;
      border-radius: 0.35rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 0.4rem;
      background: #3b82f6;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>AgenticFlow is offline</h1>
    <p>The app shell is cached, but the local engine could not be reached. Make sure the engine is running:</p>
    <code>agenticflow start</code>
    <p style="margin-top:1.5rem;"><button onclick="location.reload()">Retry</button></p>
  </div>
</body>
</html>
